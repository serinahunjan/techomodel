<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechMind - Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-container">

    <!-- Header -->
    <header class="top-header">
      <div class="logo">
        <div class="logo-container">
          <img src="Images/logo.jpg" alt="TechMind Logo">
        </div>
      </div>
      <a href="index.html" class="secondary-btn link-btn">Home</a>
    </header>

    <!-- Navbar (no login here) -->
    <nav class="navbar">
      <a href="index.html">Home</a>
      <span>|</span>
      <a href="assessment.html">Assessment</a>
      <span>|</span>
      <a href="results.html">Results</a>
      <span>|</span>
      <a href="journal.html">Journal</a>
    </nav>

    <!-- Main -->
    <main class="content-section">
      <div class="card" style="max-width: 500px;">
        <h1 class="page-title">Create an Account</h1>
        <p class="page-text">Sign up to track your technostress results.</p>

        <form id="signup-form" class="login-form">

          <!-- First Name -->
          <label class="form-label">First Name</label>
          <input type="text" id="firstName" class="form-input" required />

          <!-- Last Name -->
          <label class="form-label">Last Name</label>
          <input type="text" id="lastName" class="form-input" required />

          <!-- Email -->
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-input" required />

          <!-- Password -->
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" required />

          <!-- Repeat Password -->
          <label class="form-label">Repeat Password</label>
          <input type="password" id="confirmPassword" class="form-input" required />

          <!-- Submit -->
          <button type="submit" class="primary-btn submit-btn">
            Sign Up
          </button>

        </form>

        <!-- Link to login -->
        <p style="text-align:center; margin-top: 20px;">
          Already have an account?
          <a href="login.html" style="color:#c58be8; font-weight:600;">
            Login
          </a>
        </p>

      </div>
    </main>

  </div>

<script>
  document.getElementById("signup-form").addEventListener("submit", function (e) {
    e.preventDefault();

    const firstName = document.getElementById("firstName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();

    // validation
    if (!firstName || !lastName || !email || !password || !confirmPassword) {
      alert("Please fill in all fields.");
      return;
    }

    if (password !== confirmPassword) {
      alert("Passwords do not match.");
      return;
    }

    // store user (TEMP - frontend only)
    const user = {
      firstName,
      lastName,
      email,
      password
    };

    localStorage.setItem("technomindUser", JSON.stringify(user));

    alert("Account created successfully!");

    // redirect to login
    window.location.href = "login.html";
  });
</script>

</body>
</html>
