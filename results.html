<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechMind - Results</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="page-container">
    <header class="top-header">
      <div class="logo">
        <div class="logo-container">
          <img src="/static/Images/logo.jpg" alt="TechMind Logo">
        </div>
      </div>
      <a href="/login" class="login-btn">Login</a>
    </header>

    <nav class="navbar">
      <a href="/">Home</a>
      <span>|</span>
      <a href="/assessment">Assessment</a>
      <span>|</span>
      <a href="/results" class="active">Results</a>
      <span>|</span>
      <a href="/journal">Journal</a>
    </nav>

    <main class="content-section">
      <div class="card results-card">
        <h1 class="page-title">Your Technostress Results</h1>
        <p class="page-text">
          This page shows your overall score, your three technostress dimensions, and personalised advice.
        </p>

        <div id="results-content"></div>

        <div class="results-actions">
          <a href="/assessment" class="primary-btn link-btn">Retake Assessment</a>
          <a href="/" class="secondary-btn link-btn">Back to Home</a>
        </div>
      </div>
    </main>
  </div>

  <script>
    const resultsContent = document.getElementById("results-content");
    const stored = localStorage.getItem("technomindResult");

    function loadChart(data) {
      const canvas = document.getElementById("scoreChart");
      if (!canvas) return;

      const ctx = canvas.getContext("2d");

      new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["Overall Score", "Overload", "Invasion", "Complexity"],
          datasets: [{
            label: "Score",
            data: [
              data.score,
              data.dimensions.overload,
              data.dimensions.invasion,
              data.dimensions.complexity
            ],
            borderRadius: 8
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });
    }

    function getCategoryColour(category) {
      if (category === "low") return "#4CAF50";
      if (category === "medium") return "#FFA500";
      return "#E53935";
    }

    function getScoreMeaning(category) {
      if (category === "low") {
        return "Your responses suggest a relatively low level of technostress at the moment.";
      }
      if (category === "medium") {
        return "Your responses suggest a moderate level of technostress, meaning some aspects of technology use may be affecting your wellbeing.";
      }
      return "Your responses suggest a high level of technostress, meaning technology-related demands may be having a strong impact on your daily experience.";
    }

    if (!stored) {
      resultsContent.innerHTML = `
        <p class="no-result-text">
          No result found yet. Please complete the assessment first.
        </p>
      `;
    } else {
      const data = JSON.parse(stored);
      const categoryColor = getCategoryColour(data.category);

      resultsContent.innerHTML = `
        <div class="result-summary">
          <div class="result-box score-box">
            <h2>Overall Score</h2>
            <p class="big-score">${data.score}</p>
            <small class="result-note">Higher score = higher technostress</small>
          </div>

          <div class="result-box category-box">
            <h2>Category</h2>
            <p class="category-value" style="color:${categoryColor}; text-transform:capitalize;">
              ${data.category}
            </p>
            <small class="result-note">Based on your total score</small>
          </div>
        </div>

        <div class="result-explainer">
          <p class="page-text" style="margin-bottom: 0;">
            ${getScoreMeaning(data.category)}
          </p>
        </div>

        <div class="chart-card">
          <h2 class="question-title chart-title">Results Overview</h2>
          <canvas id="scoreChart"></canvas>
        </div>

        <div class="dimension-list enhanced-dimensions">
          <div class="dimension-item dimension-card">
            <div class="dimension-top">
              <span class="dimension-label">Overload</span>
              <span class="dimension-value">${data.dimensions.overload}</span>
            </div>
            <div class="dimension-bar">
              <div class="dimension-fill" style="width:${(data.dimensions.overload / 50) * 100}%"></div>
            </div>
          </div>

          <div class="dimension-item dimension-card">
            <div class="dimension-top">
              <span class="dimension-label">Invasion</span>
              <span class="dimension-value">${data.dimensions.invasion}</span>
            </div>
            <div class="dimension-bar">
              <div class="dimension-fill" style="width:${(data.dimensions.invasion / 50) * 100}%"></div>
            </div>
          </div>

          <div class="dimension-item dimension-card">
            <div class="dimension-top">
              <span class="dimension-label">Complexity</span>
              <span class="dimension-value">${data.dimensions.complexity}</span>
            </div>
            <div class="dimension-bar">
              <div class="dimension-fill" style="width:${(data.dimensions.complexity / 50) * 100}%"></div>
            </div>
          </div>
        </div>

        <div class="card advice-card">
          <h2 class="question-title" style="text-align:center; margin-bottom: 15px;">
            Personalised Advice
          </h2>

          <p class="page-text" style="margin-bottom: 12px;">
            <strong>${data.advice_title || "Advice not available yet"}</strong>
          </p>

          <p class="page-text" style="margin-bottom: 12px;">
            <strong>Possible Cause:</strong>
            ${data.advice_cause || "No cause available."}
          </p>

          <p class="page-text" style="margin-bottom: 0;">
            <strong>Suggested Advice:</strong>
            ${data.advice_text || "No advice available."}
          </p>
        </div>
      `;

      loadChart(data);
    }
  </script>
</body>
</html>
